<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preload"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/fonts/bootstrap-icons.woff2?856008caa5eb66df68595e734e59580d"
        as="font" type="font/woff2" crossorigin="anonymous">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/FormeOrme/projects@latest/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>TextAreaFunc</title>

    <script type="module">
        import { Dom, Section, Title, TextArea, H1, Span, Pre, Button, I } from "../module/Dom.js";
        import { Identity, debounce } from "../module/Utils.js";
        import * as Sort from "../module/Sort.js";
        import * as QueStMan from "../module/QueStMan.js";

        String.prototype.apply = function (f) { return f(this); }
        Array.prototype.apply = function (f) { return f(this); }

        const TITLE = 'TextAreaFunc';
        const START_HEIGHT = `calc(${10}lh + .5rem + var(--bs-border-width) * 2)`;

        const _default = (input, output) => output(input
            .split(`,`)
            .sort(Sort.alpha(Identity))
            .join(`\n`)
        );

        const _func = _default.toString().split("\n");
        const _head = _func.slice(0, 1);
        const _body = _func.slice(1, -1);
        const _tail = _func.slice(-1);

        const title = document.querySelector("title");


        const apply = debounce((e, n) => {
            try {
                func.node.classList.remove("is-invalid");
                func.node.classList.add("is-valid");
                eval(_head + func.node.value + _tail)(input.node.value, (out) => {
                    title.innerText = TITLE + (!out ? '' : ` [${func.node.value?.trim().substr(0, 20)}]`);
                    output.node.innerText = String(out);
                });
                QueStMan.set("func", btoa(func.node.value).replaceAll("=", ""));
            } catch (e) {
                func.node.classList.remove("is-valid");
                func.node.classList.add("is-invalid");
                output.node.innerText = e.message;
                title.innerText = TITLE;
            }
        }, 200);

        document.querySelector("head").append(Title({
            id: "title",
            innerText: TITLE
        }).create());

        const input = TextArea({
            id: "input",
            class: "border-3 border-secondary-subtle lh-sm form-control font-monospace border-bottom-0 rounded-0 rounded-top-2 pb-0",
            event: { input: apply },
            style: { height: 'calc(1.5em + .75rem + calc(var(--bs-border-width) * 2))', },
            attribute: { placeholder: "input" }
        });

        const func = TextArea({
            id: "func",
            class: "border-3 border-secondary-subtle lh-sm form-control font-monospace border-top-0 rounded-0 rounded-bottom-2 pt-0",
            value: atob(QueStMan.get("func") || '') || _body.map(s => s.trim()).join("\n"),
            event: { input: apply },
            style: { height: START_HEIGHT }
        });

        const outputPre = Pre({
            id: "output",
            class: "border-3 border-secondary-subtle lh-sm form-control mt-3 text-wrap text-break",
        });

        const buttonclass = "btn btn-sm btn-light border-3 border-secondary-subtle";
        const output = Span({
            class: "position-relative",
            children: [
                outputPre,
                Span({
                    class: "m-2 position-absolute top-0 end-0 d-flex gap-1",
                    children: [
                        Button({
                            class: buttonclass,
                            children: I({ class: "bi bi-clipboard" }),
                            attribute: {
                                title: "copy"
                            },
                            event: {
                                click: () => navigator.clipboard.writeText(output.node.innerText)
                            }
                        }),
                        Button({
                            class: buttonclass,
                            children: I({ class: "bi bi-text-wrap" }),
                            attribute: {
                                title: "toggle text-wrap"
                            },
                            event: {
                                click: () => outputPre.node.classList.toggle("text-wrap")
                            }
                        })
                    ]
                }),
            ]
        });

        console.log({ input, func, output })


        document.querySelector("body").append(Section({
            class: "container mt-2",
            attribute: { spellcheck: false },
            children: [
                H1({ innerText: "Textarea Func" }),
                input,
                func,
                output,
            ]
        }).create());
    </script>
</head>

<body>
</body>

</html>
