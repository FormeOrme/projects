<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>st_kaleidoscoped</title>
    <style>
        body {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        canvas {
            display: block;
            margin: 2em auto;
            background: #000;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <canvas id="glcanvas"></canvas>
    <script type="module">
        import { WebGLShader } from '../../module/WebGLShader.js';

        const canvas = document.getElementById('glcanvas');
        function resizeCanvas() {
            canvas.width = window.innerWidth - 10;
            canvas.height = window.innerHeight - 10;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const fragmentSource = await fetch(`kaleidoscope.frag?${Date.now()}`).then(res => res.text());

        new WebGLShader({
            canvas: canvas,
            fragmentSource: fragmentSource,
        }).animate();
    </script>
</body>

</html>
